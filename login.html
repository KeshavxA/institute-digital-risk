<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Institute of Digital Risk</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="index.css">
    <style>
        .login-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--black);
            background-image:
                radial-gradient(at 0% 0%, rgba(255, 107, 0, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 107, 0, 0.08) 0px, transparent 50%);
        }
        .login-container {
            background: var(--black-light);
            padding: 3rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .login-logo {
            height: 50px;
            margin-bottom: 2rem;
        }
        .login-form {
            text-align: left;
        }
    </style>
</head>

<body class="login-page">

    <div class="login-container">
        <a href="index.html">
            <img loading="lazy" src="assets/branding/logo_full.png" alt="IDR Logo" class="login-logo">
        </a>
        <h2 style="margin-bottom: 0.5rem; font-size: 2rem;">Welcome Back</h2>
        <p style="margin-bottom: 2rem; font-size: 1rem;">Sign in to access your dashboard.</p>
        
        <form id="login-form" class="login-form">
            <div class="form-group">
                <label for="login-email">Email Address</label>
                <input type="email" id="login-email" name="email" placeholder="example@idr.com" required>
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <div class="password-wrapper" style="position: relative;">
                    <input type="password" id="login-password" name="password" placeholder="••••••••" required style="padding-right: 40px;">
                    <button type="button" id="toggle-password" aria-label="Toggle Password Visibility" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--text-gray);">👁️</button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>
        
        <p style="margin-top: 1.5rem; font-size: 0.9rem;">
            Don't have an account? <a href="index.html#contact" style="color: var(--primary); text-decoration: none;">Register</a>
        </p>
    </div>

    <script>
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('login-password');
        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                togglePassword.textContent = type === 'password' ? '👁️' : '🙈';
            });
        }

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerHTML = '<span>Authenticating...</span>';
            btn.disabled = true;
            
            // Mock authentication delay
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        });
    </script>
</body>
</html>
